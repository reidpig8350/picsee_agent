steps:
# Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'asia-east1-docker.pkg.dev/awsomecathay/picsee-agent-repo/picsee-agent:latest', '.']
# Push the Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'asia-east1-docker.pkg.dev/awsomecathay/picsee-agent-repo/picsee-agent:latest']
# Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'picsee-agent' # Cloud Run 服務名稱
  - '--image'
  - 'asia-east1-docker.pkg.dev/awsomecathay/picsee-agent-repo/picsee-agent:latest'
  - '--region'
  - 'asia-east1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars=GCP_PROJECT_ID=awsomecathay,GOOGLE_API_KEY=SECRET_NAME=GOOGLE_API_KEY,SECRET_VERSION=latest,PICSEE_ACCESS_TOKEN=SECRET_NAME=PICSEE_ACCESS_TOKEN,SECRET_VERSION=latest'                                                                               
  - '--project' # 這個 --project 參數是給 gcloud run deploy 命令本身的                                                             
  - 'awsomecathay'