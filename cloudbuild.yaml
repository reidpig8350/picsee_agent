steps:
# Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'asia-east1-docker.pkg.dev/awsomecathay/picsee-agent-repo/picsee-agent:latest', '.']
# Push the Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'asia-east1-docker.pkg.dev/awsomecathay/picsee-agent-repo/picsee-agent:latest']
# Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'picsee-agent' # Cloud Run 服務名稱
  - '--image'
  - 'asia-east1-docker.pkg.dev/awsomecathay/picsee-agent-repo/picsee-agent:latest'
  - '--region'
  - 'asia-east1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars=GCP_PROJECT_ID=awsomecathay,GOOGLE_API_KEY=$$(gcloud secrets versions access latest --secret=GOOGLE_API_KEY --project=awsomecathay),PICSEE_ACCESS_TOKEN=$$(gcloud secrets versions access latest --secret=PICSEE_ACCESS_TOKEN --project=awsomecathay)'